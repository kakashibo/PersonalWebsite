<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111418"/>
      <stop offset="100%" stop-color="#1f3a5f"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0"   y1="160" x2="1200" y2="160"/>
    <line x1="0"   y1="470" x2="1200" y2="470"/>
    <line x1="100" y1="0"   x2="100"  y2="630"/>
    <line x1="1100" y1="0"  x2="1100" y2="630"/>
  </g>

  <!-- monogram badge -->
  <g transform="translate(100, 110)">
    <rect width="80" height="80" rx="14" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.18"/>
    <text x="40" y="56"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="38" font-weight="600" fill="#ffffff"
      text-anchor="middle" letter-spacing="-1">AS</text>
  </g>

  <!-- meta line -->
  <text x="100" y="250"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="22" font-weight="500" fill="#a8b3c1"
    letter-spacing="3">SEATTLE, WA  ·  AMAZON L6</text>

  <!-- name -->
  <text x="100" y="360"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="116" font-weight="600" fill="#ffffff"
    letter-spacing="-2">Apurv Singh</text>

  <!-- title -->
  <text x="100" y="425"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="32" font-weight="500" fill="#d4dbe5">
    Senior Software Engineer
  </text>

  <text x="100" y="470"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="26" font-weight="400" fill="#a8b3c1">
    AI Systems  ·  AWS Platforms  ·  Distributed Infrastructure
  </text>

  <!-- domain footer -->
  <text x="100" y="565"
    font-family="ui-monospace, 'SF Mono', Menlo, monospace"
    font-size="22" font-weight="500" fill="#7a8794"
    letter-spacing="1">apurvsingh.com</text>

  <!-- accent bar -->
  <rect x="100" y="590" width="60" height="3" fill="#ffffff" fill-opacity="0.6"/>
</svg>
